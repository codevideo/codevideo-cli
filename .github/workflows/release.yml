name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use a trusted-publishing compatible npm
        run: npm install --global npm@11.14.1

      - name: Test Go code
        run: go test ./...

      - name: Install npm workspace
        working-directory: npm
        run: npm ci --omit=optional

      - name: Build and verify release packages
        working-directory: npm
        run: npm run release:check

      - name: Publish initial packages with bootstrap token
        if: env.NPM_TOKEN != ''
        working-directory: npm
        run: npm run publish:packages
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish packages with npm trusted publishing
        if: env.NPM_TOKEN == ''
        working-directory: npm
        run: npm run publish:packages

      - name: Create GitHub release
        run: gh release create "$GITHUB_REF_NAME" npm/dist/release/* --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
